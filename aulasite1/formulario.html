    <h2>Conceitos sobre Formulário no HTML</h2>
    <p>Esta página possui um resumo sobre os conceitos de formulários do HTML!</p>

    <h2>Formulário</h2>

    <form>
        <div>
            <label for="nome">Nome: </label>
            <input type="text" required>
        </div>

        <br>

        <div>
            <label for="idade">Idade</label>
            <input type="number" required min="0" max="120">
        </div>

        <br>

        <div>
            <label for="usuario">Usuário: </label>
            <input type="text" required>
        </div>

        <br>

        <div>
            <label for="senha">Senha: </label>
            <input type="password" required>
        </div>

        <br>

        <div>
            <label for="dataEvento">Data do Evento: </label>
            <input type="datetime-local" required>
        </div>
        <br>

        <div> 
            <label for="">
                Telefone: 
                <input type="tel" required placeholder="(XX) XXXXX-XXXX">
            </label>
        </div>

        <br>

        <div> 
            <label for="email">
              E-mail:   <input type= "email" requiered placeholder= "xxxxxx@xxxxx.xxxx"
            </label>
        </div>

        <br>

        <div>
            <label for="Nota">
                Nota: <input type= "nota" required min="0" max="100" step= "0.5" placeholder="Apenas numeros"
        </div>

        <br>
        <br>

        <label for="Volume">
            Volume: <input type= "range" min="0" max="100" step="1.0">
</label>

        <br>
         <br>

        <div> 
            <fieldset>
                <legend>Estado Civil</legend>
                <p>
                    <label>
                        <input type="radio" name="estado_civil" value="Casado"> Casado
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="estado_civil" value="Solteiro"> Solteiro
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="estado_civil" value="Divorciado"> Divorciado
                    </label>
                </p>
            

            </fieldset>
        </div>

        <br>

        <div>
            <fieldset>
                <legend>produtos</legend>
                <p>
                    <label>
                        <input type="checkbox" name="computador" value="computador"> computador
                    </label>
                </p>
                   <p>
                    <label>
                        <input type="checkbox" name="computador" value="impressora"> impressora
                    </label>
                </p>
                   <p>
                    <label>
                        <input type="checkbox" name="computador" value="monitor"> monitor
                    </label>
                </p>
                 
            </fieldset>
        </div>
        <br>

        <div>
            <label>
                deixe sua sugestao:
                <textarea cols="30" rows="5"></textarea>
            </label>
        </div>
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
